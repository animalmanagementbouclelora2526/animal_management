{% extends "base.html" %}

{% block content %}
    <div class="admin-requests">
        <h2>Registration Requests</h2>
        
        <div class="requests-list">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>First Name</th>
                        <th>Email</th>
                        <th>Card Number</th>
                        <th>Request Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for req in requests %}
                        <tr>
                            <td>{{ req.ID }}</td>
                            <td>{{ req.Name }}</td>
                            <td>{{ req.First_name }}</td>
                            <td>{{ req.Email }}</td>
                            <td>{{ req.Card_number }}</td>
                            <td>{{ req.Request_date }}</td>
                            <td>
                                <form action="{{ url_for('process_request',request_id=req.ID,action='accept') }}"method="post"
                                    style="display:inline;">
                                    <button type="submit" class="btn btn-success">
                                        Accept
                                    </button>
                                </form>
                                <form action="{{ url_for('process_request',request_id=req.ID,action='reject') }}"
                                    method="post"
                                    style="display:inline;">
                                    <button type="submit" class="btn btn-danger">
                                        Reject
                                    </button>
                                </form>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% endblock %}
